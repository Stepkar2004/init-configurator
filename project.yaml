# This repo's own manifest — init-configurator dogfoods its own format.
# Note how little a real instance needs: the format allows more (env, paths,
# requires, doctor), this project just doesn't need them.
schema_version: 1
standard_version: 1

project:
  name: init-configurator
  description: Clone-and-run project setup driven by one project.yaml.

stacks:
  - name: cli
    language: python
    version: "3.12"
    root: .
    package_manager: uv
    dependency_files: [pyproject.toml]
    tasks:
      install: uv sync
      test: uv run pytest
      lint: uv run ruff check src tests
      typecheck: uv run mypy src

path_lint:
  include: ["**/*.py", "**/*.md", "**/*.yaml", "**/*.yml", "**/*.toml"]
  # The packaged genome mirrors .claude/skills byte-for-byte (test-enforced), so
  # .claude/ and the genome are excluded: any container paths there document other
  # repos, not this one. Nothing else in this repo carries an absolute path.
  exclude: [".venv/", ".git/", ".claude/", "src/init_configurator/genome/"]
