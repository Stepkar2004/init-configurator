# This repo's own manifest — init-configurator dogfoods its own format.
# Note how little a real instance needs: the format allows more (env, paths,
# requires, doctor), this project just doesn't need them.
schema_version: 1

project:
  name: init-configurator
  description: Clone-and-run project setup driven by one project.yaml.

stacks:
  - name: cli
    language: python
    version: "3.12"
    root: .
    package_manager: uv
    dependency_files: [pyproject.toml]
    tasks:
      install: uv sync
      test: uv run pytest
      lint: uv run ruff check src tests
      typecheck: uv run mypy src

path_lint:
  include: ["**/*.py", "**/*.md", "**/*.yaml", "**/*.yml", "**/*.toml"]
  # CLAUDE.md (the constitution) intentionally points at a machine-local brain
  # note — the only allowed absolute path in this repo. The packaged genome
  # mirrors .claude/skills byte-for-byte (test-enforced), and .claude/ is excluded
  # too: its container paths document other repos, not this one.
  exclude: [".venv/", ".git/", "CLAUDE.md", ".claude/", "src/init_configurator/genome/"]
