name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    # Development happens on Windows, CI consumers on Linux. Path handling and
    # line-ending behavior (textfile.py) differ per OS, so both must run.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      # exact pin: setup-uv publishes no floating v8 major tag (checked 2026-07-11),
      # so pin the release. v4/v5 targeted the now-deprecated Node 20; v7/v8 run Node 24.
      - uses: astral-sh/setup-uv@v8.3.2
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src
      - run: uv run pytest --cov --cov-fail-under=90
      - run: uv run initc lint-paths
      - run: uv run initc validate
      # The published schema is generated from the pydantic model but committed
      # by hand; this fails the build when the two drift apart. Runs on both OSes:
      # generated files are written LF (textfile.py) and checked out LF
      # (.gitattributes), so a diff here means drift and nothing else.
      - name: schema is up to date
        run: uv run initc schema && git diff --exit-code schema/
