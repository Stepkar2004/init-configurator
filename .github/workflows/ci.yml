name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    # Development happens on Windows, deployment on Linux. local_mode has a
    # sys.platform == "win32" branch, so a Linux-only matrix never runs it.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src
      - run: uv run pytest --cov --cov-fail-under=90
      - run: uv run initc lint-paths
      - run: uv run initc validate
      # The published schema is generated from the pydantic model but committed
      # by hand; this fails the build when the two drift apart. Runs on both OSes:
      # generated files are written LF (textfile.py) and checked out LF
      # (.gitattributes), so a diff here means drift and nothing else.
      - name: schema is up to date
        run: uv run initc schema && git diff --exit-code schema/
